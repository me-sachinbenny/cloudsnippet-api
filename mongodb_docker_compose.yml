services:
  mongodb:
    image: mongo:latest
    container_name: cloud_snippet_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - cloud_snippet_mongodb_data:/data/db

volumes:
  cloud_snippet_mongodb_data: